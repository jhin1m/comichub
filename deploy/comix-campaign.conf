# Comix.to import campaign config — sourced by import-campaign.sh
# All durations in seconds.

# Phase 1 — Hot manga (pages 1-100, many chapters, moderate cooldown)
PHASE_1_FROM=1
PHASE_1_TO=100
STEP_P1=5
COOLDOWN_P1_MIN=300    # 5 min
COOLDOWN_P1_MAX=600    # 10 min

# Phase 2 — Bulk (pages 101-700, fewer chapters per manga, short cooldown)
PHASE_2_FROM=101
PHASE_2_TO=700
STEP_P2=20
COOLDOWN_P2_MIN=120    # 2 min
COOLDOWN_P2_MAX=300    # 5 min

# Parallel shards — each shard runs independently with its own proxy IP + checkpoint.
PARALLEL_SHARDS=3
PROXY_URLS=""         # comma-separated: "http://u:p@ip1:port,http://u:p@ip2:port,..."

# Page-fetch retry (forwarded to comix-import.ts)
PAGE_RETRY_MAX=3
PAGE_RETRY_BACKOFF="5,15,45"  # comma-separated seconds, one per attempt

# Safety gates
DISK_ALERT_PCT=75             # lowered from 85 — parallel shards write ~3× faster
MAX_CONSECUTIVE_FAILURES=3
HEALTH_FAIL_PAUSE=900         # 15 min pause on exit code 2
