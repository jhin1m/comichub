# Auto-merge Dependabot PRs that meet safety criteria.
#
# Policy:
# - patch updates → auto-approve + auto-merge once CI green (squash)
# - minor updates of SECURITY-only PRs → auto-approve + auto-merge (advisory-driven)
# - everything else (major, non-security minor) → human review required
#
# CI gate is intrinsic: auto-merge waits for required status checks.
# Repo Settings must require ci.yml frontend+backend jobs as status checks for this gate to work.

name: Dependabot Auto-Merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve + enable auto-merge — patch updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr review --approve "$PR_URL" -b "auto-approve: patch dependency update"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve + enable auto-merge — security minor updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-minor' &&
          steps.meta.outputs.alert-state == 'AUTO_DISMISSED' == false &&
          contains(steps.meta.outputs.dependency-group, 'security')
        run: |
          gh pr review --approve "$PR_URL" -b "auto-approve: security minor update"
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment — manual review required
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-major' ||
          (steps.meta.outputs.update-type == 'version-update:semver-minor' &&
           !contains(steps.meta.outputs.dependency-group, 'security'))
        run: |
          gh pr comment "$PR_URL" --body "🔍 Manual review required — \`${{ steps.meta.outputs.update-type }}\` for \`${{ steps.meta.outputs.dependency-names }}\`. Auto-merge skipped per policy."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
