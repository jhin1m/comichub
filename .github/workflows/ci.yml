# CI — runs on every PR + main push.
# Goal: gate Dependabot auto-merge with green signal (typecheck + unit tests + build).
# Skips: e2e (Playwright, needs browsers), DB-backed tests (no Postgres service in CI yet).

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs when new commits arrive on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build (includes type-check)
        run: pnpm build
        env:
          # Build-time public env vars — placeholders for CI, real values in deploy.
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_SITE_NAME: ComicHub
          NEXT_PUBLIC_SITE_URL: https://zetsu.moe

  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build (nest build)
        run: pnpm build
