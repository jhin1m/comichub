services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: comichub
      POSTGRES_USER: comichub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comichub"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port — access via: docker compose exec postgres psql -U comichub -d comichub

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No host port — access via: docker compose exec redis redis-cli

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://comichub:${DB_PASSWORD}@postgres:5432/comichub
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL:-https://example.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      # host-gateway lets build container reach the running old backend via
      # host-port-mapped 127.0.0.1:3001 → bypasses Cloudflare bot challenge.
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.example.com/api/v1}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-ComicHub}
        NEXT_PUBLIC_SITE_LOGO: ${NEXT_PUBLIC_SITE_LOGO:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://example.com}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
        INTERNAL_API_URL: http://host.docker.internal:3001/api/v1
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: 3000
      INTERNAL_API_URL: http://backend:3001/api/v1
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Reverse proxy — terminates TLS using Cloudflare Origin Certificate.
  # Exposes :443 only; CF edge enforces HTTP→HTTPS so :80 is not needed.
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./deploy/certs:/etc/caddy/certs:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      DOMAIN: ${DOMAIN}
      API_SUBDOMAIN: ${API_SUBDOMAIN}
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # One-shot migration runner — applies SQL files via psql, tracks by hash.
  # Invoked via: docker compose --profile migrate run --rm migrate
  migrate:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backend/src/database/migrations:/migrations:ro
      - ./deploy/migrate.sh:/migrate.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/migrate.sh"]
    profiles: ["migrate"]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
