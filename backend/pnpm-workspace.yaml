# pnpm v11 build-script approvals. Native deps need build scripts allowed
# so they compile/extract their platform binaries during `pnpm install`.
# @nestjs/core (postinstall ad) and @scarf/scarf (telemetry) are skipped.
allowBuilds:
  '@nestjs/core': false
  '@scarf/scarf': false
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  sharp: true

# Overrides moved from package.json -> here per pnpm v11 conventions.
overrides:
  path-to-regexp: '>=8.4.0'
  lodash: '>=4.18.0'
